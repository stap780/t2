  documentation:
    index:
      title: "Документация по интеграциям"
      lead: "Краткое руководство для сотрудников: как связаны товары и заказы с Avito, InSales и МойСклад, что происходит автоматически и где смотреть настройки."
      cards:
        avito:
          title: "Avito"
          summary: "Кабинеты, привязки объявлений, заказы и каталог."
        insales:
          title: "InSales"
          summary: "Привязки вариантов, цены, остатки и заказы."
        moysklad:
          title: "МойСклад"
          summary: "Товары, остатки, выгрузка и приём заказов."
      sections:
        overview:
          title: "Общая схема"
          paragraphs:
            - "Приложение — единый реестр товаров и заказов. Внешние системы подключаются через интеграции в разделе «Настройки»."
            - "Заказы из Avito, InSales и МойСклад не передаются друг другу напрямую: сначала они попадают в реестр заказов приложения, и уже оттуда выгружаются или обновляются во внешних системах."
            - "Связь товаров с внешними системами хранится в привязках (varbind) и синхронизируется отдельно от заказов — через каталог и фоновые задачи."
            - "Важно: для корректной работы заказов во всех интеграциях нужен маппинг статусов — сопоставление статуса во внешней системе со статусом в реестре. Без настроенного маппинга изменения статуса могут не доходить до Avito, InSales или МойСклад. Настройка — в «Настройки» → соответствующая интеграция."
            - "В списке товаров цветные метки (МС, InS, Avito) показывают, что товар уже связан. По клику открывается карточка во внешней системе."
        products:
          title: "Товары и метки"
          items:
            - "МойСклад и InSales — привязка на уровне варианта товара; для ссылки нужен штрихкод варианта."
            - "Avito — привязка на уровне товара (Product); в значении хранится avitoId объявления, штрихкод для метки не обязателен."
            - "Несколько кабинетов Avito поддерживаются: у одного товара может быть несколько привязок, метка показывает название кабинета."
            - "В фильтре товаров для каждого кабинета Avito можно отобрать «С привязкой» / «Без привязки»."
        orders:
          title: "Заказы"
          paragraphs:
            - "Заказы из Avito, InSales и МойСклад попадают в общий реестр «Заказы». При изменении статуса в МойСклад приложение может отправить статус обратно в Avito или InSales — если настроен маппинг."
            - "Выгрузку заказа в МойСклад можно запустить вручную с карточки заказа; для Avito и InSales выгрузка часто происходит автоматически при импорте."
            - "Дата включения интеграции заказов (в настройках МойСклад) отсекает старые заказы при первичном подключении: заказы, созданные раньше этой даты, не импортируются, если их ещё нет в реестре. Уже связанные заказы продолжают обновляться."
        schedule:
          title: "Автоматические задачи (ориентир)"
          items:
            - "Avito — каталог: ежедневно в 00:10; заказы: каждые 3 минуты."
            - "InSales — привязки: 20:10; цены и остатки: 20:30; изображения: 20:45."
            - "МойСклад — остатки: каждые 3 часа; массовое создание товаров: 8:00 и 20:00."
      diagrams:
        orders:
          title: "Заказы: реестр как центр"
          caption: "Каналы продаж не обмениваются заказами напрямую — между ними всегда реестр заказов в приложении."
          note: "Avito и InSales не связаны друг с другом. Связь идёт только через реестр."
          nodes:
            avito: "Avito"
            insales: "InSales"
            moysklad: "МойСклад"
            registry: "Реестр заказов"
          arrows:
            import: "импорт / webhook"
            webhook: "webhook"
            export: "выгрузка заказа"
            status: "статус"
        products:
          title: "Товары: отдельно от заказов"
          caption: "Остатки, цены, привязки и каталог синхронизируются через каталог товаров, а не через заказы."
          note: "Заказ может ссылаться на товар по привязке, но обмен каталогом идёт по отдельным каналам."
          nodes:
            catalog: "Каталог товаров"
            avito: "Avito"
            insales: "InSales"
            moysklad: "МойСклад"
          links:
            moysklad: "varbind, остатки"
            insales: "varbind, цены, фото"
            avito: "varbind, каталог"
    avito:
      title: "Интеграция Avito"
      lead: "Несколько кабинетов, привязка объявлений к товарам и автоматический обмен заказами."
      sections:
        setup:
          title: "Настройка"
          paragraphs:
            - "Кабинеты Avito добавляются в «Настройки → Avito». Для каждого указываются API-ключи и название кабинета — оно отображается в метках товаров."
          items:
            - "На странице кабинета можно вручную запустить синхронизацию каталога и загрузку заказов."
            - "Маппинг статусов заказов настраивается отдельно для каждого кабинета."
        bindings:
          title: "Привязки товаров"
          paragraphs:
            - "Привязка создаётся на карточке товара (не варианта). В поле значения хранится avitoId — идентификатор объявления на Avito."
            - "Ночная синхронизация каталога (00:10) подтягивает avitoId из отчёта автозагрузки и обновляет привязки."
          items:
            - "Метка в списке товаров ведёт на страницу объявления: avito.ru/{avitoId}."
            - "Если кабинет переименован или удалён, метка может показывать резервное имя «Av.{номер}»."
        orders:
          title: "Заказы"
          items:
            - "Новые заказы с Avito опрашиваются каждые 3 минуты и попадают в реестр заказов."
            - "При необходимости заказ можно выгрузить в МойСклад с карточки заказа."
            - "Действует общая дата включения интеграции заказов из настроек МойСклад."
        filter:
          title: "Фильтр в каталоге"
          paragraphs:
            - "В фильтре товаров для каждого подключённого кабинета Avito доступны переключатели «С привязкой» и «Без привязки». Можно комбинировать несколько кабинетов."
    insales:
      title: "Интеграция InSales"
      lead: "Синхронизация вариантов, цен, остатков и заказов с магазином на InSales."
      sections:
        setup:
          title: "Настройка"
          paragraphs:
            - "Подключение — в «Настройки → InSales»: домен магазина, ключи API, проверка соединения."
          items:
            - "Webhook'и для заказов можно добавить с карточки интеграции."
            - "Маппинг статусов и полей заказа настраивается в соответствующих разделах."
        bindings:
          title: "Привязки товаров"
          paragraphs:
            - "Привязка создаётся на уровне варианта товара. Для отображения ссылки «InS» в списке товаров у варианта должен быть заполнен штрихкод."
          items:
            - "Ночная задача в 20:10 синхронизирует varbind — связи variant ↔ товар InSales."
            - "В 20:30 обновляются цены и остатки; в 20:45 — изображения."
        orders:
          title: "Заказы"
          items:
            - "Заказы приходят по webhook или при ручной загрузке с карточки InSales."
            - "Из карточки заказа можно отправить данные обратно в InSales."
            - "Старые заказы отсекаются датой включения интеграции (настройки МойСклад), если их ещё нет в реестре."
    moysklad:
      title: "Интеграция МойСклад"
      lead: "Складской учёт: остатки, создание товаров и приём заказов из других каналов."
      sections:
        setup:
          title: "Настройка"
          paragraphs:
            - "Подключение — в «Настройки → Moysklad»: логин, пароль или токен, проверка API."
          items:
            - "Webhook заказов регистрируется с карточки интеграции."
            - "Организация, склад и маппинг полей заказа задаются в настройках выгрузки заказов."
        bindings:
          title: "Привязки и товары"
          paragraphs:
            - "Привязка варианта к товару МойСклад хранится в varbind. Ссылка «МС» в списке товаров работает по штрихкоду варианта."
          items:
            - "Остатки из МойСклад подтягиваются автоматически каждые 3 часа."
            - "Массовое создание отсутствующих товаров в МойСклад — в 8:00 и 20:00 (для товаров с привязкой или по правилам импорта)."
            - "С карточки товара можно вручную запустить синхронизацию с МойСклад."
        orders:
          title: "Заказы"
          items:
            - "Входящие заказы из МойСклад обрабатываются через webhook."
            - "Заказы из Avito и InSales можно выгрузить в МойСклад с карточки заказа."
            - "Поле «Дата включения интеграции заказов» задаёт момент, с которого новые заказы из всех каналов начинают попадать в реестр. Ранее созданные заказы без связи не импортируются."
